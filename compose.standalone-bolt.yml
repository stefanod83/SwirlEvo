services:
  swirl:
    image: cuigh/swirl:latest
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - MODE=standalone
      - DB_TYPE=bolt
      - DB_ADDRESS=/data
      - SWIRL_BACKUP_KEY=${SWIRL_BACKUP_KEY:-}
      - TZ=${TZ:-UTC}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - swirl-data:/data

volumes:
  swirl-data:
